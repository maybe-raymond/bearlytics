services:
  bearlytics:
    image: ghcr.io/hermanmartinus/bearlytics:latest
    ports:
      - 8080:8080
    volumes:
      - ./analytics:/app/data
    environment:
      # CSRF_TRUSTED_ORIGINS: Include ALL domains that will access the admin interface
      # - The analytics server domain (bearlytics.ikka.cloud)
      # - Any domains making requests (e.g., https://www.ikka.cloud)
      # - Local development (http://localhost:8080)
      CSRF_TRUSTED_ORIGINS: "https://bearlytics.ikka.cloud,https://www.ikka.cloud,http://localhost,http://localhost:8080"
      # ALLOWED_HOSTS: Include the analytics server domain where Django is running
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-bearlytics.ikka.cloud,www.ikka.cloud,localhost}
      DB_PATH: ${DB_PATH:-/app/data/analytics.db}
      DEBUG: False
      SALT_SECRET: ${SALT_SECRET:?err}
      SECRET_KEY: ${SECRET_KEY:?err}
      UID: 1000
      GID: 1000
    restart: unless-stopped
